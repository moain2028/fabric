global:
  scrape_interval: 1s
  evaluation_interval: 5s
  external_labels:
    monitor: 'bcms-fabric-monitor'

scrape_configs:
  # ── Prometheus Self-Monitoring ─────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Hyperledger Fabric Orderer ─────────────────────────────────────────────
  - job_name: "orderer"
    static_configs:
      - targets: ["orderer.example.com:9443"]
    metrics_path: /metrics

  # ── Hyperledger Fabric Peers ───────────────────────────────────────────────
  - job_name: "peer0_org1"
    static_configs:
      - targets: ["peer0.org1.example.com:9444"]
    metrics_path: /metrics

  - job_name: "peer0_org2"
    static_configs:
      - targets: ["peer0.org2.example.com:9445"]
    metrics_path: /metrics

  # ── BCMS REST API ──────────────────────────────────────────────────────────
  - job_name: "bcms_rest_api"
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:3000"]
    metrics_path: /metrics

  # ── Container Metrics via cAdvisor ─────────────────────────────────────────
  - job_name: cadvisor
    scrape_interval: 5s
    static_configs:
      - targets: ['cadvisor:8080']

  # ── Node Exporter (Host Metrics) ───────────────────────────────────────────
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
